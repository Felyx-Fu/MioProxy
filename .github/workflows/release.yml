name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Release Windows MVP
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release version
        run: |
          $package = Get-Content package.json | ConvertFrom-Json
          $expectedTag = "v$($package.version)"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Release tag $env:GITHUB_REF_NAME does not match package version $($package.version). Expected $expectedTag."
          }

      - name: Typecheck
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Check optional integration entrypoints
        run: pnpm test:integration:local

      - name: Package Windows zip
        run: pnpm release:win

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v4
        with:
          name: MioProxy-windows-${{ github.ref_name }}
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $asset = Get-ChildItem -Path dist -Filter *.zip | Select-Object -First 1
          if ($null -eq $asset) {
            throw "No Windows zip found under dist."
          }
          $notes = @"
          Windows MVP release for $env:GITHUB_REF_NAME.

          This release contains an unsigned portable zip generated by Electron Builder.
          "@
          gh release view "$env:GITHUB_REF_NAME" *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload "$env:GITHUB_REF_NAME" $asset.FullName --clobber
          } else {
            gh release create "$env:GITHUB_REF_NAME" $asset.FullName --title "MioProxy $env:GITHUB_REF_NAME" --notes "$notes"
          }
