name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Windows MVP
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Check optional integration entrypoints
        run: pnpm test:integration:local

      - name: Build
        run: pnpm build

      - name: Package Windows app
        run: pnpm pack:win

      - name: Upload Windows app artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: MioProxy-win-unpacked-${{ github.sha }}
          path: dist/win-unpacked
          if-no-files-found: error
          retention-days: 14
